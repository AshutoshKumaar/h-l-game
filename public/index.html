<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Higher / Lower — H-L API Demo</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="container">
    <header>
      <h1>Higher · Lower</h1>
      <p class="hint">Compare YouTube channels (subscribers)</p>
      <div id="status" class="status">Checking API…</div>
    </header>

    <section class="controls">
      <button id="btnNewRound">New Round</button>
      <div class="guess-buttons">
        <button id="btnHigher" disabled>Higher</button>
        <button id="btnLower" disabled>Lower</button>
      </div>
    </section>

    <section class="cards">
      <article class="card" id="leftCard">
        <img class="thumb" id="leftImage" alt="Left channel image">
        <h2 id="leftName">—</h2>
        <div class="metric" id="leftMetric">—</div>
      </article>

      <article class="card" id="rightCard">
        <img class="thumb" id="rightImage" alt="Right channel image">
        <h2 id="rightName">—</h2>
        <div class="metric" id="rightMetric">Hidden</div>
      </article>
    </section>

    <section id="result" class="result" aria-live="polite"></section>

    <footer class="footer">
      <small>Uses H-L API — demo base URL configured in app.js</small>
    </footer>
  </main>

  <script src="app.js"></script>
</body>
</html>
